<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>String Operations</title>
    <link rel="stylesheet" href="string.css">
</head>
<body>
    <h2>String Operations</h2>

    <div class="input-group">
        <input type="text" id="input1" placeholder="Enter first string...">
        <input type="text" id="input2" placeholder="Enter second string...">
    </div>

    <div id="result"></div>

    <div class="semicircle-container">
        <button onclick="findLength()">Length</button>
        <button onclick="reverseString()">Reverse</button>
        <button onclick="checkPalindrome()">Palindrome</button>
        <button onclick="concatenateStrings()">Concatenate</button>
        <button onclick="findInitials()">Initials</button>
        <button onclick="clearFields()">Clear</button>
    </div>

    <script src="string.js"></script>
</body>
</html>
