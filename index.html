<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudForge | WT Project</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #0f172a; /* Deep dark blue background */
            color: #f8fafc;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Team Name Styling */
        .team-brand {
            text-align: center;
        }

        .team-brand h2 {
            font-size: 1.2rem;
            color: #38bdf8; /* Sky blue accent */
            letter-spacing: 4px;
            margin-bottom: 0;
            text-transform: uppercase;
        }

        .team-brand h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin: 10px 0;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Navigation Cards */
        .menu-container {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu-container a {
            text-decoration: none;
            color: white;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px 50px;
            border-radius: 15px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            min-width: 150px;
            backdrop-filter: blur(10px);
        }

        .menu-container a:hover {
            background: rgba(56, 189, 248, 0.2);
            border-color: #38bdf8;
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
        }

        /* Team Members Footer */
        .team-footer {
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
            width: 100%;
            max-width: 600px;
        }

        .team-footer h3 {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 10px;
        }

        .members-list {
            font-weight: 300;
            color: #cbd5e1;
            font-size: 1rem;
        }

        .member-name {
            display: inline-block;
            margin: 0 10px;
        }
    </style>
</head>
<body>

    <div class="team-brand">
        <h2>Team</h2>
        <h1>CloudForge</h1>
        <p>Web Technology Project Portfolio</p>
    </div>

    <div class="menu-container">
        <a href="string/string.html">String<br>Operations</a>
        <a href="math/math.html">Math<br>Operations</a>
        <a href="crud/crud.html">CRUD<br>Operations</a>
    </div>

    <div class="team-footer">
        <h3>CONTRIBUTORS</h3>
        <div class="members-list">
            <span class="member-name">Kumari Pragati Chaudhary</span> • 
            <span class="member-name">Uma</span> • 
            <span class="member-name">Utpreksha</span> • 
            <span class="member-name">Nandini</span>
        </div>
    </div>

</body>
</html>
